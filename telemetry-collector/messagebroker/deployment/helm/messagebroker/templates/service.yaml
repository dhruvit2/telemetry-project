apiVersion: v1
kind: Service
metadata:
  name: {{ include "messagebroker.fullname" . }}
  labels:
    {{- include "messagebroker.labels" . | nindent 4 }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
      name: broker
  selector:
    {{- include "messagebroker.selectorLabels" . | nindent 4 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "messagebroker.fullname" . }}-headless
  labels:
    {{- include "messagebroker.labels" . | nindent 4 }}
spec:
  clusterIP: None
  type: ClusterIP
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
      name: broker
  selector:
    {{- include "messagebroker.selectorLabels" . | nindent 4 }}
