syntax = "proto3";

package pb;

option go_package = "github.com/dhruvit2/messagebroker/pkg/pb";

service MessageBroker {
  rpc CreateTopic(CreateTopicRequest) returns (CreateTopicResponse);
  rpc ProduceMessage(ProduceRequest) returns (ProduceResponse);
  rpc ConsumeMessages(ConsumeRequest) returns (ConsumeResponse);
  rpc GetTopicMetadata(GetTopicMetadataRequest) returns (TopicMetadata);
  rpc BrokerMetadata(BrokerMetadataRequest) returns (BrokerMetadataResponse);
  rpc JoinConsumerGroup(JoinConsumerGroupRequest) returns (JoinConsumerGroupResponse);
  rpc LeaveConsumerGroup(LeaveConsumerGroupRequest) returns (LeaveConsumerGroupResponse);
  rpc FetchAssignments(FetchAssignmentsRequest) returns (FetchAssignmentsResponse);
  rpc CommitOffset(CommitOffsetRequest) returns (CommitOffsetResponse);
  rpc FetchOffset(FetchOffsetRequest) returns (FetchOffsetResponse);
  rpc ListConsumerGroups(ListConsumerGroupsRequest) returns (ListConsumerGroupsResponse);
  rpc DescribeConsumerGroup(DescribeConsumerGroupRequest) returns (DescribeConsumerGroupResponse);
}

message CreateTopicRequest {
  string topic = 1;
  int32 num_partitions = 2;
  int32 replication_factor = 3;
}

message CreateTopicResponse {
  string topic = 1;
  int32 partitions = 2;
  bool success = 3;
}

message ProduceRequest {
  string topic = 1;
  int32 partition = 2;
  bytes key = 3;
  bytes value = 4;
}

message ProduceResponse {
  string topic = 1;
  int32 partition = 2;
  int64 offset = 3;
}

message ConsumeRequest {
  string topic = 1;
  int32 partition = 2;
  int64 offset = 3;
  int32 max_messages = 4;
}

message Message {
  bytes key = 1;
  bytes value = 2;
  int64 offset = 3;
}

message ConsumeResponse {
  string topic = 1;
  int32 partition = 2;
  repeated Message messages = 3;
}

message GetTopicMetadataRequest {
  string topic = 1;
}

message PartitionMetadata {
  int32 id = 1;
  int32 leader = 2;
  repeated int32 replicas = 3;
  repeated int32 isr = 4;
}

message TopicMetadata {
  string topic = 1;
  repeated PartitionMetadata partitions = 2;
}

message BrokerMetadataRequest {}

message BrokerMetadataResponse {
  int32 id = 1;
  string host = 2;
  int32 port = 3;
  bool is_healthy = 4;
}

// Consumer Group Messages
message JoinConsumerGroupRequest {
  string group_id = 1;
  string member_id = 2;
  string session_timeout = 3;      // e.g., "30s"
  repeated string topics = 4;
}

message JoinConsumerGroupResponse {
  string group_id = 1;
  string member_id = 2;
  int32 generation_id = 3;
  repeated string members = 4;     // All members in group
  string leader = 5;               // Consumer group coordinator leader
  bool need_rebalance = 6;
}

message LeaveConsumerGroupRequest {
  string group_id = 1;
  string member_id = 2;
}

message LeaveConsumerGroupResponse {
  string group_id = 1;
  bool success = 2;
}

message FetchAssignmentsRequest {
  string group_id = 1;
  string member_id = 2;
  int32 generation_id = 3;
}

message PartitionAssignment {
  int32 partition = 1;
}

message FetchAssignmentsResponse {
  string group_id = 1;
  int32 generation_id = 2;
  string topic = 3;
  repeated PartitionAssignment assignments = 4;  // Partitions assigned to this member
}

message CommitOffsetRequest {
  string group_id = 1;
  string member_id = 2;
  string topic = 3;
  int32 partition = 4;
  int64 offset = 5;
}

message CommitOffsetResponse {
  string group_id = 1;
  string topic = 2;
  int32 partition = 3;
  bool success = 4;
}

message FetchOffsetRequest {
  string group_id = 1;
  string topic = 2;
  int32 partition = 3;
}

message FetchOffsetResponse {
  string group_id = 1;
  string topic = 2;
  int32 partition = 3;
  int64 offset = 4;
}

message ListConsumerGroupsRequest {}

message ConsumerGroupSummary {
  string group_id = 1;
  string state = 2;              // "Empty", "Preparing", "Stable", "Dead"
  int32 members = 3;
  repeated string topics = 4;
}

message ListConsumerGroupsResponse {
  repeated ConsumerGroupSummary groups = 1;
}

message MemberDescription {
  string member_id = 1;
  string client_id = 2;
  string host = 3;
  repeated int32 assigned_partitions = 4;
}

message DescribeConsumerGroupRequest {
  string group_id = 1;
}

message DescribeConsumerGroupResponse {
  string group_id = 1;
  string state = 2;
  string protocol_type = 3;
  string protocol = 4;
  repeated MemberDescription members = 5;
}
