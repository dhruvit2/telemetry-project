apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "messagebroker.fullname" . }}
  labels:
    {{- include "messagebroker.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "messagebroker.fullname" . }}-headless
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "messagebroker.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "messagebroker.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "messagebroker.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      containers:
      - name: broker
        securityContext:
          {{- toYaml .Values.securityContext | nindent 12 }}
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        
        ports:
        - name: broker
          containerPort: {{ .Values.broker.port }}
          protocol: TCP
        
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: BROKER_ID
          value: ""
        - name: BROKER_HOST
          value: "$(POD_NAME).{{ include "messagebroker.fullname" . }}-headless.{{ .Release.Namespace }}.svc.cluster.local"
        - name: BROKER_PORT
          value: "{{ .Values.broker.port }}"
        - name: COORDINATOR_URL
          value: {{ .Values.coordinator.url }}
        - name: COORDINATOR_TYPE
          value: {{ .Values.coordinator.type }}
        - name: ETCD_USERNAME
          value: {{ .Values.coordinator.username | quote }}
        - name: ETCD_PASSWORD
          value: {{ .Values.coordinator.password | quote }}
        - name: DATA_DIR
          value: {{ .Values.storage.mountPath }}
        
        livenessProbe:
          {{- toYaml .Values.livenessProbe | nindent 12 }}
        
        readinessProbe:
          {{- toYaml .Values.readinessProbe | nindent 12 }}
        
        resources:
          {{- toYaml .Values.resources | nindent 12 }}
        
        volumeMounts:
        - name: config
          mountPath: /etc/messagebroker
        - name: data
          mountPath: {{ .Values.storage.mountPath }}
        - name: tmp
          mountPath: /tmp

      volumes:
      - name: config
        configMap:
          name: {{ include "messagebroker.fullname" . }}-config
      - name: tmp
        emptyDir: {}

  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: ["ReadWriteOnce"]
      {{- if .Values.persistence.storageClassName }}
      storageClassName: {{ .Values.persistence.storageClassName }}
      {{- end }}
      resources:
        requests:
          storage: {{ .Values.persistence.size }}
