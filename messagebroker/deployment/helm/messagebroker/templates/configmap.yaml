apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "messagebroker.fullname" . }}-config
  labels:
    {{- include "messagebroker.labels" . | nindent 4 }}
data:
  broker-config.yaml: |
    broker:
      id: {{ .Values.broker.id }}
      host: {{ .Values.broker.host }}
      port: {{ .Values.broker.port }}
      replicationFactor: {{ .Values.broker.replicationFactor }}
      minISR: {{ .Values.broker.minISR }}
      retentionMs: {{ .Values.broker.retentionMs }}
      segmentBytes: {{ .Values.broker.segmentBytes }}
      maxPartitions: {{ .Values.broker.maxPartitions }}
    
    coordinator:
      enabled: {{ .Values.coordinator.enabled }}
      url: {{ .Values.coordinator.url }}
    
    storage:
      enabled: {{ .Values.storage.enabled }}
      mountPath: {{ .Values.storage.mountPath }}
